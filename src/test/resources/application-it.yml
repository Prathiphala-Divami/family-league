spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  mail:
    host: localhost
    port: 3025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: integration-test-secret-key-min-32-chars!!
    expiry-seconds: 300
  scheduler:
    prediction-reminder-cron: "-"
    result-alert-cron: "-"
    reminder-window-hours: 24
  prediction:
    match-lock-offset-hours: 1
    league-lock-offset-hours: 4
  notification:
    admin-email: admin@test.local
    from-address: noreply@test.local
  async:
    core-pool-size: 1
    max-pool-size: 1
    queue-capacity: 10
