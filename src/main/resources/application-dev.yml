spring:
  flyway:
    baseline-on-migrate: true

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.example: DEBUG
    org.springframework.security: DEBUG

# ──────────────────────────────────────────────────────────────
# Required environment variables for local development.
# Set these in a .env file loaded by your IDE run config or shell.
# NEVER commit real values to version control.
# ──────────────────────────────────────────────────────────────
# DB_URL=jdbc:postgresql://localhost:5432/family_league_dev
# DB_USERNAME=postgres
# DB_PASSWORD=<your_local_db_password>
# JWT_SECRET=<min_32_character_random_secret>
# MAIL_HOST=sandbox.smtp.mailtrap.io
# MAIL_PORT=587
# MAIL_USERNAME=<mailtrap_username>
# MAIL_PASSWORD=<mailtrap_password>
# MAIL_FROM=noreply@familyleague.local
# ADMIN_EMAIL=admin@familyleague.local
