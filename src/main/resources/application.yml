spring:
  application:
    name: prathiphala-family-league

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-seconds: 3600

  scheduler:
    prediction-reminder-cron: "0 0 9 * * ?"
    result-alert-cron: "0 0/30 * * * ?"
    reminder-window-hours: 24

  prediction:
    match-lock-offset-hours: 1
    league-lock-offset-hours: 4

  notification:
    admin-email: ${ADMIN_EMAIL}
    from-address: ${MAIL_FROM}

  async:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 100
    thread-name-prefix: "async-"

logging:
  file:
    name: logs/family-league.log
  level:
    root: INFO
    com.example: INFO
